name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test-backend:
    name: Test the backend (WIP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Run backend tests
        run: |
          cd backend
          go test ./...

  test-frontend:
    name: Test the frontend (WIP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npm run type-check

      - name: Run tests
        run: |
          cd frontend
          npm run test:unit -- --run

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fintrack-backend:latest
            ghcr.io/${{ github.repository_owner }}/fintrack-backend:${{ steps.sha.outputs.short }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fintrack-frontend:latest
            ghcr.io/${{ github.repository_owner }}/fintrack-frontend:${{ steps.sha.outputs.short }}

      - name: Update Kubernetes manifests
        run: |
          sed -i "s|image: fintrack-backend:.*|image: ghcr.io/${{ github.repository_owner }}/fintrack-backend:${{ steps.sha.outputs.short }}|g" k8s/backend/deployment.yaml
          sed -i "s|image: fintrack-frontend:.*|image: ghcr.io/${{ github.repository_owner }}/fintrack-frontend:${{ steps.sha.outputs.short }}|g" k8s/frontend/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml
          git commit -m "ci: update images to ${{ steps.sha.outputs.short }}" || echo "No changes to commit"
          git push