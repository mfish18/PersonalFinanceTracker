apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fintrack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mfish18/PersonalFinanceTracker.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: fintrack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true